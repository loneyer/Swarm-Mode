interface:
  display_name: "Swarm Mode"
  short_description: "Trigger swarm-style orchestration with up to 30 parallel workers"
  default_prompt: "Use $swarm-mode to split this task into independent parallel lanes, keep one main orchestrator, cap active workers at 30, read config/model-routing.json before routing workers, first check the repo for project-defined subagent model-routing overrides and consult .codex-runtime/swarm-routing-policy.json if present, stop and ask once before spawning workers when an unresolved override conflicts with swarm-mode routing, record the user's decision in the repo-local policy file, and merge the results into one final answer."
policy:
  allow_implicit_invocation: true
